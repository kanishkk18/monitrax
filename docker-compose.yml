version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: changd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: changd
      POSTGRES_PASSWORD: changd_secret
      POSTGRES_DB: changd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: changd_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
